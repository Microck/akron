name: Feature request
description: Propose a focused Akron change.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Feature requests should describe the player goal first. Akron classifies behavior by gameplay, proof, hidden information, and state impact.
  - type: textarea
    id: goal
    attributes:
      label: Player goal
      description: What should a player, pack author, or contributor be able to do?
      placeholder: I want to ...
    validations:
      required: true
  - type: textarea
    id: current-workaround
    attributes:
      label: Current workaround
      description: How do people handle this today, if at all?
    validations:
      required: false
  - type: textarea
    id: proposed-behavior
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful behavior change.
    validations:
      required: true
  - type: dropdown
    id: policy-impact
    attributes:
      label: Expected policy impact
      description: Choose the closest expected classification. Maintainers may change this after review.
      options:
        - Goldberry/Hardlist clean
        - Regular clean
        - Cheat
        - Unsure
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification notes
      description: What tests, screenshots, clips, map SID, or live Celeste checks would prove this works?
    validations:
      required: false
