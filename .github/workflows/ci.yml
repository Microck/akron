name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Akron.sln --nologo

      - name: Build
        run: dotnet build Akron.sln --configuration Release --no-restore --nologo

      - name: Test
        run: dotnet test tests/akron-tests.csproj --configuration Release --no-build --nologo

      - name: Verify packaged mod
        run: test -f Akron.zip

      - name: Upload packaged mod
        uses: actions/upload-artifact@v4
        with:
          name: Akron
          path: Akron.zip
          if-no-files-found: error
