name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-24.04
    environment: release-build
    env:
      HAS_CELESTE_REFS: ${{ secrets.AKRON_CELESTE_REFS_URL != '' && vars.AKRON_CELESTE_REFS_SHA256 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Check Celeste reference configuration
        run: |
          if [ "$HAS_CELESTE_REFS" != "true" ]; then
            echo "::error::AKRON_CELESTE_REFS_URL and AKRON_CELESTE_REFS_SHA256 are required to build Akron."
            exit 1
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 8.0.418

      - name: Restore verified Celeste references
        env:
          AKRON_CELESTE_REFS_URL: ${{ secrets.AKRON_CELESTE_REFS_URL }}
          AKRON_CELESTE_REFS_TOKEN: ${{ secrets.AKRON_CELESTE_REFS_TOKEN }}
          AKRON_CELESTE_REFS_SHA256: ${{ vars.AKRON_CELESTE_REFS_SHA256 }}
          GITHUB_TOKEN: ${{ github.token }}
        run: bash .github/scripts/restore-celeste-references.sh

      - name: Restore locked dependencies
        run: dotnet restore Akron.sln --locked-mode --nologo -p:ContinuousIntegrationBuild=true

      - name: Build
        run: dotnet build Akron.sln --configuration Release --no-restore --nologo -p:ContinuousIntegrationBuild=true

      - name: Test
        run: dotnet test tests/akron-tests.csproj --configuration Release --no-build --nologo

      - name: Verify packaged mod
        run: |
          test -f Akron.zip
          if unzip -Z1 Akron.zip | grep -E '\.pdb$'; then
            echo "::error::Player package must not contain PDB files."
            exit 1
          fi
          unzip -Z1 Akron.zip | grep -Fx ThirdPartyNotices.txt >/dev/null

      - name: Upload packaged mod
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: Akron
          path: Akron.zip
          if-no-files-found: error
          retention-days: 3
