name: Sync GameBanana README Links

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *"

permissions:
  contents: write

concurrency:
  group: sync-gamebanana-readme-links
  cancel-in-progress: false

jobs:
  sync:
    name: Sync README links
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Sync GameBanana links
        run: bash scripts/sync-gamebanana-readme-links.sh

      - name: Commit README update
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if git diff --quiet -- README.md; then
            echo "README already points at the latest GameBanana file."
            exit 0
          fi

          git config user.name "Microck"
          git config user.email "contact@micr.dev"
          git add README.md
          git commit -m "docs: sync gamebanana readme links"
          cleanup_git_auth() {
            git config --local --unset-all http.https://github.com/.extraheader || true
          }
          authorization="$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w0)"
          git config --local http.https://github.com/.extraheader "AUTHORIZATION: basic $authorization"
          trap cleanup_git_auth EXIT
          git push origin HEAD:main
