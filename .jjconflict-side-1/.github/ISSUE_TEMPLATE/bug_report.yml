name: Bug report
description: Report a reproducible Akron problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Include the smallest reproduction that proves the behavior.
  - type: input
    id: akron-version
    attributes:
      label: Akron version
      description: Use the version shown by Everest, GameBanana, or the release zip.
      placeholder: 0.1.1-beta.1
    validations:
      required: true
  - type: input
    id: celeste-version
    attributes:
      label: Celeste and Everest versions
      description: Include both when possible.
      placeholder: Celeste 1.4.0.0, Everest 1.4449.0
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: List OS, controller/input setup, display mode, and related mods such as Speedrun Tool, CelesteTAS, Extended Variant Mode, or Motion Smoothing.
      placeholder: Windows 11, keyboard, fullscreen, Speedrun Tool enabled.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Use numbered steps. Include map SID, room, setup state, and commands or overlay interactions when relevant.
      placeholder: |
        1. Launch Celeste through Everest.
        2. Load map SID ...
        3. Open Akron with Tab.
        4. Toggle ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Add logs, screenshots, clips, or proof sidecars when they help. Keep captures focused and avoid private paths or unrelated overlays.
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed secrets, local tokens, private paths, and unrelated personal data from this report.
          required: true
